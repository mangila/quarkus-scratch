# Devservices
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.port=5432
quarkus.datasource.devservices.username=postgres
quarkus.datasource.devservices.password=postgres
# Logging
quarkus.log.console.json.enabled=false
# Flyway
quarkus.flyway.clean-disabled=false
# PokeAPI
quarkus.rest-client.pokeapi.logging.scope=all
quarkus.rest-client.pokeapi.logging.body-limit=1024