# Application Props
app.integration.pokeapi.token=${POKEAPI_TOKEN:changeit}
app.integration.pgevent.channels[0]=customer_evict
# Quarkus Props
quarkus.virtual-threads.enabled=true
# Container
quarkus.container-image.build=true
quarkus.container-image.builder=jib
quarkus.container-image.group=mangila
quarkus.container-image.name=customer-api
# HTTP
quarkus.http.port=8085
quarkus.http.enable-compression=true
quarkus.http.http2=true
# Postgres
##  default datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.driver=org.postgresql.Driver
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
## named datasource: pgevent
quarkus.datasource.pgevent.db-kind=pgsql
quarkus.datasource.pgevent.driver=com.impossibl.postgres.jdbc.PGDriver
quarkus.datasource.pgevent.jdbc.url=jdbc:pgsql://localhost:5432/quarkus
quarkus.datasource.pgevent.username=postgres
quarkus.datasource.pgevent.password=postgres
# Flyway
quarkus.flyway.clean-disabled=true
# Redis
# PokeApi
quarkus.rest-client.pokeapi.url=https://pokeapi.co/api/v2
quarkus.rest-client.pokeapi.http2=true
quarkus.rest-client.pokeapi.logging.scope=none
quarkus.rest-client.pokeapi.logging.masked-headers=X-API-TOKEN
quarkus.rest-client.pokeapi.logging.body-limit=1
# JobRunr
quarkus.jobrunr.database.table-prefix=customer_
quarkus.jobrunr.job-scheduler.enabled=true
quarkus.jobrunr.background-job-server.enabled=true
quarkus.jobrunr.background-job-server.name=${quarkus.application.name}
quarkus.jobrunr.dashboard.enabled=true
quarkus.jobrunr.dashboard.port=9001
# Logging
quarkus.log.console.enabled=true
quarkus.log.console.json.enabled=true
quarkus.log.console.json.log-format=ecs
quarkus.log.console.json.pretty-print=true
# Native
# this option builds inside a container, might need to crank up the memory for the image build to not go out of memory(OOM).
quarkus.native.container-build=true
quarkus.native.resources.includes=data/**
# Management
quarkus.management.enabled=true
quarkus.management.port=9000
# Health
quarkus.smallrye-health.ui.enabled=true
quarkus.smallrye-health.include-problem-details=true
# OpenApi
quarkus.swagger-ui.enabled=true