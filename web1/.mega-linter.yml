# MegaLinter configuration file
# More info at https://megalinter.io
# Configuration documentation: https://megalinter.io/latest/configuration/
# Linters documentation: https://megalinter.io/latest/descriptors/
---
APPLY_FIXES: all
VALIDATE_ALL_CODEBASE: true
PRINT_ALL_FILES: true
SHOW_ELAPSED_TIME: true
PARALLEL: true
CLEAR_REPORT_FOLDER: true
FLAVOR_SUGGESTIONS: false

FAIL_IF_MISSING_LINTER_IN_FLAVOR: true
ENABLE_LINTERS:
  - JAVA_CHECKSTYLE
  - JAVA_PMD
  - SQL_SQLFLUFF
  - YAML_YAMLLINT
  - MARKDOWN_MARKDOWNLINT

JAVA_CHECKSTYLE_CONFIG_FILE: megalinter-config/google-checks.xml
JAVA_PMD_CONFIG_FILE: megalinter-config/pmd-ruleset.xml
SQL_SQLFLUFF_CONFIG_FILE: megalinter-config/sqlfluff.ini

# Exclude generated/IDE/build/report directories
FILTER_REGEX_EXCLUDE: (target/|build/|.quarkus/|.venv/|.idea/|.git/)

# Reporting
LOG_LEVEL: INFO
SARIF_REPORTER: true
CONSOLE_REPORTER: false
# Human-readable reports
MARKDOWN_SUMMARY_REPORTER: true