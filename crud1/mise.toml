[tools]
java = "graalvm-community-25.0.2"
quarkus = "3.35.1"
node = "24.15.0"

[tasks.mvn-format]
description = "Format POM sorting and code formatting in api module"
run = [
    "mvn -f api/pom.xml sortpom:sort",
    "mvn -f api/pom.xml fmt:format",
]

[tasks.mvn-validate]
description = "Maven Validate goal in api module"
run = [
    "mvn -f api/pom.xml validate",
]

[tasks.mvn-test]
description = "Maven Test goal in api module"
run = [
    "mvn -f api/pom.xml test",
]

[tasks."sonar:scan"]
description = "Run SonarQube analysis with JaCoCo coverage"
run = """
sonar-scanner \
  -Dsonar.projectKey=my_project \
  -Dsonar.sources=api/src/main/java \
  -Dsonar.java.binaries=api/target/classes \
  -Dsonar.host.url=$SONAR_HOST_URL \
  -Dsonar.login=$SONAR_USERNAME \
  -Dsonar.password=$SONAR_PASSWORD \
  -Dsonar.coverage.jacoco.xmlReportPaths=api/target/jacoco-report/jacoco.xml \
"""

[tasks.api-k6]
description = "Run k6 tests in api module"
run = [
    "k6 run k6/read-write-api-k6-test.js"
]
